- hosts: all
  become: yes
  tasks:
  - name: Create readmeabook data directories
    ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      owner: hugo
      group: hugo
      mode: 0775
    loop:
      - /home/hugo/readmeabook
      - /home/hugo/readmeabook/config
      - /home/hugo/readmeabook/redis
      - /home/hugo/readmeabook/cache

  # pgdata must be owned by UID 102 (postgres user inside container).
  # Create with open permissions so Docker/entrypoint can take ownership.
  - name: Create pgdata directory (postgres takes ownership on first start)
    ansible.builtin.file:
      path: /home/hugo/readmeabook/pgdata
      state: directory
      mode: 0755

  - name: apt install docker-compose-plugin
    ansible.builtin.apt:
      name: docker-compose-plugin
      state: present

  - name: Clone ansible setup github repository
    ansible.builtin.git:
      repo: https://github.com/DonHugo/Ansible_playbooks_ubuntu_server.git
      dest: /home/ansible/repos/Ansible_playbooks_ubuntu_server
      clone: yes
      update: yes

  # Remove any pre-existing stopped/created container so compose can start fresh
  - name: Remove stale readmeabook container if present
    community.docker.docker_container:
      name: readmeabook
      state: absent
      force_kill: yes

  - name: Deploy readmeabook via docker compose
    community.docker.docker_compose:
      project_src: /home/ansible/repos/Ansible_playbooks_ubuntu_server/docker/readmeabook/
      recreate: always
    register: output

  - name: Show compose output
    ansible.builtin.debug:
      var: output
