version: "3.2"
services:
  readmeabook:
    container_name: readmeabook
    image: ghcr.io/kikootwo/readmeabook:latest
    restart: unless-stopped
    ports:
      - 3030:3030
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
      # Required for OAuth/OIDC callback
      - PUBLIC_URL=https://readmeabook.tells.se
    volumes:
      - /home/hugo/readmeabook/config:/app/config          # JWT secrets, encryption keys
      - /home/hugo/readmeabook/pgdata:/var/lib/postgresql/data  # PostgreSQL database
      - /home/hugo/readmeabook/redis:/var/lib/redis         # Redis persistence
      - /home/hugo/readmeabook/cache:/cache
      - /home/skogsparlan/data/torrents/:/downloads
      - /home/skogsparlan/data/usenet/complete/:/destination
      - /home/skogsparlan/data/media/books/:/books
